# Supabase local config — template defaults.
# Reference: https://supabase.com/docs/guides/local-development/cli/config
#
# --- Operational guardrails (this repo) ---
# - Local development targets the Docker stack from `pnpm supabase start` only.
# - Optional hosted work: link a **non-production** project only when a human needs it;
#   keep production project refs and keys out of git (internal runbooks / secret store).
# - Do **not** apply schema to production from a laptop: ship SQL via committed migrations
#   and your deployment pipeline (see docs/guides/migration-workflow.md, AGENTS.md).
# - Prefer repo scripts under `scripts/supabase/*.sh` and `package.json` `pnpm supabase:*`;
#   avoid ad-hoc `supabase db push --linked` unless your team documents an approved wrapper.
#
# --- Seeds ---
# Single file: `supabase db reset` / `supabase start` runs `./seed.sql` after migrations.
# Edit `supabase/seed.sql` only (sections are commented inside the file).
#
# --- Local troubleshooting (ports) ---
# If `supabase start` or `db reset` fails with connection reset / EOF on 127.0.0.1:54321
# or :54322, run `lsof -i :54321 -i :54322`. IDEs (e.g. Cursor) sometimes forward those
# ports and intercept loopback traffic — remove those forwards or change `[api].port` /
# `[db].port` below to free values. Other Supabase projects: `supabase stop --all` then
# `pnpm supabase start` in this repo. Last resort: `supabase start --ignore-health-check`
# (stack runs; fix ports before relying on Kong health).

project_id = "workspace-local"

# --- API (PostgREST). `extensions` on search_path matches typical extension installs. ---
[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

# --- Database ---
[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[db.network_restrictions]
enabled = false
allowed_cidrs = ["0.0.0.0/0"]
allowed_cidrs_v6 = ["::/0"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.s3_protocol]
enabled = true

[storage.analytics]
enabled = false
max_namespaces = 5
max_tables = 10
max_catalogs = 2

[storage.vector]
enabled = false
max_buckets = 10
max_indexes = 5

# --- Auth (adjust site_url / redirects to your app dev URL and port) ---
[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://127.0.0.1:3000",
  "http://127.0.0.1:3000/callback",
  "http://127.0.0.1:3000/auth/confirm",
  "http://127.0.0.1:3000/reset-password",
  "http://localhost:3000/callback",
  "http://localhost:3000/auth/confirm",
  "http://localhost:3000/reset-password",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
password_requirements = "letters_digits"

[auth.rate_limit]
email_sent = 2
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30
web3 = 30

[auth.email]
# Wired to GoTrue `external.email.enabled` — must stay true or email/password sign-in breaks.
# New account creation is gated by `[auth].enable_signup` above.
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

# JWT enrichment from Postgres (roles, permissions[], access_version, subscription in app_metadata).
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

# OAuth, Web3, third-party IdPs: add tables per provider when needed — see
# https://supabase.com/docs/guides/auth/social-login

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

# Edge Functions: `verify_jwt` applies when `supabase/functions/<name>/` exists.
# Add or remove rows to match functions you scaffold with `pnpm edge:new -- <name>`.

[functions.check-user-role]
verify_jwt = false

[functions.provision-user-role]
verify_jwt = false

[functions.google-calendar-webhook]
verify_jwt = false

[functions.google-calendar-oauth]
verify_jwt = false

[functions.periodic-sync]
verify_jwt = false

[functions.pgmq-worker]
verify_jwt = false

[functions.renew-watch-channels]
verify_jwt = false

[functions.trigger-periodic-sync]
verify_jwt = false

[functions.trigger-process-sync-queue]
verify_jwt = false

[functions.trigger-renew-watch-channels]
verify_jwt = false

[functions.health]
verify_jwt = false

[functions.stripe]
verify_jwt = false

[functions.expand-series]
verify_jwt = false

[functions.process-pending-session-billing]
verify_jwt = false

[functions.process-account-deletion-requests]
verify_jwt = false

[functions.checkout-webhook]
verify_jwt = false

[analytics]
enabled = true
port = 54327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
