  # ===========================================================================
  - zero-barrel-policy.mdc
  - no-console-logging.mdc
  - file-size-limit.mdc
  - english-only.mdc

  # ===========================================================================
  # DATABASE & MIGRATIONS
  # ===========================================================================
  - cli-migrations-only.mdc
  - rls-first-design.mdc

  # ===========================================================================
  # ARCHITECTURE
  # ===========================================================================
  - repository-pattern.mdc
  - server-actions-boundary.mdc
  - private-directory-convention.mdc

  # ===========================================================================
  # UI & COMPONENTS
  # ===========================================================================
  - ui-cli-only.mdc
  - shadcn-immutable.mdc

  # ===========================================================================
  # DOCUMENTATION
  # ===========================================================================
  - three-level-docs.mdc
  - adr-template.mdc

  # ===========================================================================
  # TESTING
  # ===========================================================================
  - tdd-required.mdc
